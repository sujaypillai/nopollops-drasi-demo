services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nopollops
      POSTGRES_PASSWORD: nopollops
      POSTGRES_DB: nopollops
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nopollops -d nopollops"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:

