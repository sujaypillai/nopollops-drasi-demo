apiVersion: v1
kind: ServiceAccount
metadata:
  name: nopollops-api
  namespace: nopollops-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nopollops-demo-manager
  namespace: nopollops-demo
rules:
  - apiGroups: ["", "apps"]
    resources: ["pods", "deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nopollops-api-demo-manager
  namespace: nopollops-demo
subjects:
  - kind: ServiceAccount
    name: nopollops-api
    namespace: nopollops-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nopollops-demo-manager

