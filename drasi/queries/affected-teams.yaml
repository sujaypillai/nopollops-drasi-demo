apiVersion: v1
kind: ContinuousQuery
name: affected-teams
spec:
  mode: query
  sources:
    subscriptions:
      - id: nopollops-postgres
        nodes:
          - sourceLabel: app_submissions
          - sourceLabel: risky_images
    joins:
      - id: HAS_RISK
        keys:
          - label: app_submissions
            property: image
          - label: risky_images
            property: image
  query: >
    MATCH
      (submission:app_submissions)-[:HAS_RISK]->(risk:risky_images)
    WHERE
      risk.active = 't'
      AND submission.status <> 'deleted'
    RETURN
      submission.team_name AS teamName,
      count(submission.id) AS riskyWorkloadCount
